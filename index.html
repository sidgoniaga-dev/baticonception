  <style>
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body { margin: 0; background: #F7F4ED; font-family: 'Manrope', system-ui, sans-serif; overflow-x: hidden; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn { animation: fadeIn 0.5s ease-out; }

    select { background-image: none; }

    /* Splash while React boots */
    #__boot {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #F7F4ED; z-index: 9999;
      transition: opacity .4s ease;
    }
    #__boot.gone { opacity: 0; pointer-events: none; }
    #__boot .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #AED8E6; margin: 0 4px;
      animation: bounce 1.2s infinite ease-in-out;
    }
    #__boot .dot:nth-child(2) { animation-delay: .15s; }
    #__boot .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(.6); opacity: .4; }
      40%           { transform: scale(1);  opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="__boot"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  <div id="root"></div>


  <script>
    // Hide splash once React has mounted something into #root
    (function () {
      const boot = document.getElementById('__boot');
      const root = document.getElementById('root');
      const obs = new MutationObserver(() => {
        if (root.childElementCount > 0) {
          boot.classList.add('gone');
          setTimeout(() => boot.remove(), 500);
          obs.disconnect();
        }
      });
      obs.observe(root, { childList: true });
    })();
  </script>
</body>
