// ===== motion.jsx =====
// Reusable scroll/cursor animation primitives.
// Drop on top of React 18 + Babel. No external deps.

const { useState: useStateM, useEffect: useEffectM, useRef: useRefM } = React;

// ─────────────────────────────────────────────────────────────
// Reveal — fade + translateY on viewport enter
// ─────────────────────────────────────────────────────────────
const Reveal = ({
  children,
  delay = 0,
  y = 16,
  duration = 800,
  as: Tag = "div",
  className = "",
  threshold = 0.12,
  once = true,
  style = {},
  ...rest
}) => {
  const ref = useRefM(null);
  const [visible, setVisible] = useStateM(false);

  useEffectM(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(
      ([e]) => {
        if (e.isIntersecting) {
          setVisible(true);
          if (once) obs.disconnect();
        } else if (!once) {
          setVisible(false);
        }
      },
      { threshold, rootMargin: "0px 0px -8% 0px" }
    );
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [threshold, once]);

  return (
    <Tag
      ref={ref}
      className={className}
      style={{
        opacity: visible ? 1 : 0,
        transform: visible ? "translateY(0)" : `translateY(${y}px)`,
        transition: `opacity ${duration}ms cubic-bezier(.22,1,.36,1) ${delay}ms, transform ${duration}ms cubic-bezier(.22,1,.36,1) ${delay}ms`,
        willChange: "opacity, transform",
        ...style,
      }}
      {...rest}
    >
      {children}
    </Tag>
  );
};

// ─────────────────────────────────────────────────────────────
// Magnetic — element drifts toward cursor when nearby
// ─────────────────────────────────────────────────────────────
const Magnetic = ({ children, strength = 0.28, radius = 90, className = "" }) => {
  const ref = useRefM(null);

  useEffectM(() => {
    const el = ref.current;
    if (!el || window.matchMedia("(pointer: coarse)").matches) return;

    let raf = null;
    let tx = 0,
      ty = 0,
      cx = 0,
      cy = 0;

    const loop = () => {
      cx += (tx - cx) * 0.18;
      cy += (ty - cy) * 0.18;
      el.style.transform = `translate3d(${cx.toFixed(2)}px, ${cy.toFixed(2)}px, 0)`;
      if (Math.abs(tx - cx) > 0.05 || Math.abs(ty - cy) > 0.05) {
        raf = requestAnimationFrame(loop);
      } else {
        raf = null;
      }
    };

    const onMove = (e) => {
      const r = el.getBoundingClientRect();
      const px = r.left + r.width / 2;
      const py = r.top + r.height / 2;
      const dx = e.clientX - px;
      const dy = e.clientY - py;
      const reach = radius + Math.max(r.width, r.height) / 2;
      if (Math.hypot(dx, dy) < reach) {
        tx = dx * strength;
        ty = dy * strength;
      } else {
        tx = 0;
        ty = 0;
      }
      if (!raf) raf = requestAnimationFrame(loop);
    };

    window.addEventListener("mousemove", onMove, { passive: true });
    return () => {
      window.removeEventListener("mousemove", onMove);
      if (raf) cancelAnimationFrame(raf);
    };
  }, [strength, radius]);

  return (
    <span ref={ref} className={`inline-block will-change-transform ${className}`}>
      {children}
    </span>
  );
};

// ─────────────────────────────────────────────────────────────
// CountUp — animates 0 → target on viewport enter
// ─────────────────────────────────────────────────────────────
const CountUp = ({ to, suffix = "", prefix = "", duration = 1500, className = "" }) => {
  const ref = useRefM(null);
  const [value, setValue] = useStateM(0);

  useEffectM(() => {
    if (!ref.current) return;
    let raf;
    let start;
    const obs = new IntersectionObserver(
      ([e]) => {
        if (e.isIntersecting) {
          const step = (t) => {
            if (!start) start = t;
            const p = Math.min((t - start) / duration, 1);
            const eased = 1 - Math.pow(1 - p, 3);
            setValue(eased * to);
            if (p < 1) raf = requestAnimationFrame(step);
          };
          raf = requestAnimationFrame(step);
          obs.disconnect();
        }
      },
      { threshold: 0.5 }
    );
    obs.observe(ref.current);
    return () => {
      obs.disconnect();
      if (raf) cancelAnimationFrame(raf);
    };
  }, [to, duration]);

  const display = Number.isInteger(to) ? Math.round(value) : value.toFixed(0);
  return (
    <span ref={ref} className={className}>
      {prefix}
      {display}
      {suffix}
    </span>
  );
};

Object.assign(window, { Reveal, Magnetic, CountUp });

let beforeAfterAutoDemoUsed = false;

const BeforeAfter = ({ avant, apres, alt }) => {
  const [pos, setPos] = React.useState(50);
  const ref = React.useRef(null);
  const dragging = React.useRef(false);
  const interacted = React.useRef(false);

  React.useEffect(() => {
    if (beforeAfterAutoDemoUsed || !ref.current) return;
    let raf = null;
    const obs = new IntersectionObserver(
      ([e]) => {
        if (e.isIntersecting && !beforeAfterAutoDemoUsed && !interacted.current) {
          beforeAfterAutoDemoUsed = true;
          const start = performance.now();
          const dur = 2400;
          const ease = (t) => 1 - Math.pow(1 - t, 3);
          const step = (t) => {
            if (interacted.current) return;
            const p = Math.min((t - start) / dur, 1);
            // 50 → 82 → 18 → 50
            let v;
            if (p < 0.33) v = 50 + 32 * ease(p / 0.33);
            else if (p < 0.66) v = 82 - 64 * ease((p - 0.33) / 0.33);
            else v = 18 + 32 * ease((p - 0.66) / 0.34);
            setPos(v);
            if (p < 1) raf = requestAnimationFrame(step);
          };
          raf = requestAnimationFrame(step);
          obs.disconnect();
        }
      },
      { threshold: 0.45 }
    );
    obs.observe(ref.current);
    return () => {
      obs.disconnect();
      if (raf) cancelAnimationFrame(raf);
    };
  }, []);

  const move = (clientX) => {
    interacted.current = true;
    const el = ref.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const p = ((clientX - rect.left) / rect.width) * 100;
    setPos(Math.max(0, Math.min(100, p)));
  };

  return (
    <div
      ref={ref}
      className="relative aspect-[4/3] md:aspect-[3/2] overflow-hidden bg-[#0A0A0A] select-none touch-none"
      style={{ cursor: "ew-resize" }}
      onMouseDown={(e) => {
        dragging.current = true;
        move(e.clientX);
      }}
      onMouseMove={(e) => dragging.current && move(e.clientX)}
      onMouseUp={() => (dragging.current = false)}
      onMouseLeave={() => (dragging.current = false)}
      onTouchStart={(e) => {
        dragging.current = true;
        move(e.touches[0].clientX);
      }}
      onTouchMove={(e) => dragging.current && move(e.touches[0].clientX)}
      onTouchEnd={() => (dragging.current = false)}
    >
      <img
        src={apres}
        alt={`${alt} — après`}
        loading="lazy"
        draggable={false}
        className="absolute inset-0 w-full h-full object-cover"
      />
      <img
        src={avant}
        alt={`${alt} — avant`}
        loading="lazy"
        draggable={false}
        className="absolute inset-0 w-full h-full object-cover"
        style={{ clipPath: `inset(0 ${100 - pos}% 0 0)` }}
      />

      <div className="absolute top-4 left-4 bg-[#0A0A0A]/75 text-[#F7F4ED] text-[10px] md:text-xs uppercase tracking-[0.25em] px-3 py-1.5 rounded-full backdrop-blur-sm pointer-events-none">
        Avant
      </div>
      <div className="absolute top-4 right-4 bg-[#AED8E6] text-[#0A0A0A] text-[10px] md:text-xs uppercase tracking-[0.25em] px-3 py-1.5 rounded-full pointer-events-none">
        Après
      </div>

      <div
        className="absolute top-0 bottom-0 w-[2px] bg-[#F7F4ED] pointer-events-none shadow-[0_0_20px_rgba(0,0,0,0.4)]"
        style={{ left: `${pos}%` }}
      >
        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-11 h-11 md:w-12 md:h-12 rounded-full bg-[#F7F4ED] flex items-center justify-center shadow-2xl ring-1 ring-[#0A0A0A]/10">
          <svg viewBox="0 0 24 24" className="w-5 h-5 text-[#0A0A0A]" fill="currentColor">
            <path d="M9 6 4 12l5 6V6zm6 0v12l5-6-5-6z" />
          </svg>
        </div>
      </div>

      <div className="absolute bottom-4 left-1/2 -translate-x-1/2 text-[10px] uppercase tracking-[0.25em] text-[#F7F4ED]/80 bg-[#0A0A0A]/40 px-3 py-1 rounded-full backdrop-blur-sm pointer-events-none">
        Glissez pour comparer
      </div>
    </div>
  );
};

const { useState: useStateC } = React;

const inputBase =
  "w-full bg-transparent border-0 border-b border-[#0A0A0A]/20 py-3 text-[#0A0A0A] placeholder-[#0A0A0A]/30 focus:border-[#0A0A0A] focus:outline-none transition-colors";

const Field = ({ label, children }) => (
  <label className="block">
    <span className="text-xs uppercase tracking-[0.2em] text-[#0A0A0A]/60 mb-2 block">
      {label}
    </span>
    {children}
  </label>
);

const RadioGroup = ({ name, value, options, onChange }) => (
  <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
    {options.map((opt) => (
      <button
        type="button"
        key={opt}
        onClick={() => onChange(name, opt)}
        className={`px-4 py-3 rounded-full text-sm border transition-all ${
          value === opt
            ? "bg-[#0A0A0A] text-[#F7F4ED] border-[#0A0A0A]"
            : "border-[#0A0A0A]/20 text-[#0A0A0A]/70 hover:border-[#0A0A0A]"
        }`}
      >
        {opt}
      </button>
    ))}
  </div>
);

const ContactPage = () => {
  const [form, setForm] = useStateC({
    nom: "",
    telephone: "",
    email: "",
    rue: "",
    ville: "",
    codePostal: "",
    typeProjet: "",
    delai: "",
    surface: "",
    description: "",
    contactType: "",
  });
  const [sent, setSent] = useStateC(false);
  const [submitting, setSubmitting] = useStateC(false);
  const [error, setError] = useStateC(null);

  const update = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  const updateRadio = (k, v) => setForm({ ...form, [k]: v });

  const submit = async (e) => {
    e.preventDefault();
    if (!form.delai) { setError("Veuillez choisir un délai pour votre projet."); return; }
    if (!form.surface) { setError("Veuillez choisir une surface concernée."); return; }
    if (!form.contactType) { setError("Veuillez choisir un mode de contact."); return; }
    setSubmitting(true);
    setError(null);
    try {
      const res = await fetch("https://formspree.io/f/xnjrzvbe", {
        method: "POST",
        headers: { "Accept": "application/json", "Content-Type": "application/json" },
        body: JSON.stringify({
          Nom: form.nom,
          Téléphone: form.telephone,
          Email: form.email,
          Adresse: `${form.rue}, ${form.codePostal} ${form.ville}`,
          "Type de projet": form.typeProjet,
          Délai: form.delai,
          Surface: form.surface,
          Description: form.description,
          "Mode de contact préféré": form.contactType,
        }),
      });
      if (res.ok) {
        setSent(true);
        setTimeout(() => window.scrollTo({ top: 0, behavior: "smooth" }), 100);
      } else {
        setError("Une erreur est survenue. Veuillez réessayer ou nous contacter par email.");
      }
    } catch {
      setError("Impossible d'envoyer le formulaire. Vérifiez votre connexion internet.");
    } finally {
      setSubmitting(false);
    }
  };

  if (sent) {
    return (
      <section data-screen-label="Contact / Sent" className="min-h-[80vh] flex items-center justify-center px-6 py-16 md:py-20 lg:py-24">
        <div className="max-w-2xl text-center">
          <div className="w-20 h-20 rounded-full bg-[#AED8E6] mx-auto mb-8 flex items-center justify-center">
            <Check className="w-10 h-10 text-[#0A0A0A]" strokeWidth={2} />
          </div>
          <h2 className="font-['Fraunces'] text-5xl md:text-6xl text-[#0A0A0A] leading-tight mb-6">
            Demande <em className="italic font-light">envoyée</em>.
          </h2>
          <p className="text-lg text-[#0A0A0A]/70 leading-relaxed">
            Nous vous répondrons dans les plus brefs délais afin de discuter de votre projet
            et vous proposer une solution adaptée.
          </p>
        </div>
      </section>
    );
  }


  return (
    <React.Fragment>
      <BigHero
        eyebrow="Discutons de votre projet"
        title="Contact"
        intro="Notre équipe est à votre écoute. Remplissez le formulaire ci-dessous, nous vous recontacterons rapidement."
        labels={["Téléphone", "Email", "Devis gratuit", "Belgique"]}
      />

      <section data-screen-label="Contact / Infos" className="border-y border-[#0A0A0A]/10 bg-[#F7F4ED]">
        <div className="max-w-[1400px] mx-auto px-6 md:px-10 grid md:grid-cols-3 divide-y md:divide-y-0 md:divide-x divide-[#0A0A0A]/10">
          {[
            [MapPin, "Zone d'intervention", "Belgique", null],
            [Phone, "Téléphone", "+32 470 86 63 59", "tel:+32470866359"],
            [Mail, "Email", "baticonception@outlook.com", "mailto:baticonception@outlook.com"],
          ].map(([Ic, label, val, href], i) => (
            <div key={i} className="py-6 md:py-8 px-2 md:px-8 flex items-center gap-5">
              <div className="w-12 h-12 rounded-full bg-[#AED8E6] flex items-center justify-center shrink-0">
                <Ic className="w-5 h-5 text-[#0A0A0A]" strokeWidth={1.5} />
              </div>
              <div>
                <div className="text-xs uppercase tracking-[0.2em] text-[#0A0A0A]/50 mb-1">
                  {label}
                </div>
                {href ? (
                  <a href={href} className="text-lg text-[#0A0A0A] hover:text-[#0A0A0A]/70 transition">
                    {val}
                  </a>
                ) : (
                  <div className="text-lg text-[#0A0A0A]">{val}</div>
                )}
              </div>
            </div>
          ))}
        </div>
      </section>

      <section data-screen-label="Contact / Formulaire" className="py-14 md:py-20 lg:py-28 bg-[#F7F4ED]">
        <div className="max-w-4xl mx-auto px-6 md:px-10">
          <form onSubmit={submit} className="space-y-16">
            <div>
              <div className="flex items-baseline gap-4 mb-10">
                <span className="font-['Fraunces'] italic text-3xl text-[#AED8E6]">01</span>
                <h3 className="font-['Fraunces'] text-2xl md:text-3xl text-[#0A0A0A]">
                  Informations personnelles
                </h3>
              </div>
              <div className="grid md:grid-cols-2 gap-x-8 gap-y-8">
                <Field label="Nom et prénom *">
                  <input
                    type="text"
                    required
                    value={form.nom}
                    onChange={update("nom")}
                    className={inputBase}
                    placeholder="Marie Dupont"
                  />
                </Field>
                <Field label="Téléphone *">
                  <input
                    type="tel"
                    required
                    value={form.telephone}
                    onChange={update("telephone")}
                    className={inputBase}
                    placeholder="+32 ..."
                  />
                </Field>
                <Field label="Email *">
                  <input
                    type="email"
                    required
                    value={form.email}
                    onChange={update("email")}
                    className={inputBase}
                    placeholder="vous@email.be"
                  />
                </Field>
                <Field label="Rue et numéro *">
                  <input
                    type="text"
                    required
                    value={form.rue}
                    onChange={update("rue")}
                    className={inputBase}
                    placeholder="Rue ..."
                  />
                </Field>
                <Field label="Ville *">
                  <input
                    type="text"
                    required
                    value={form.ville}
                    onChange={update("ville")}
                    className={inputBase}
                    placeholder="Bruxelles"
                  />
                </Field>
                <Field label="Code postal *">
                  <input
                    type="text"
                    required
                    value={form.codePostal}
                    onChange={update("codePostal")}
                    className={inputBase}
                    placeholder="1000"
                  />
                </Field>
              </div>
            </div>

            <div>
              <div className="flex items-baseline gap-4 mb-10">
                <span className="font-['Fraunces'] italic text-3xl text-[#AED8E6]">02</span>
                <h3 className="font-['Fraunces'] text-2xl md:text-3xl text-[#0A0A0A]">
                  Votre projet
                </h3>
              </div>

              <Field label="Pour quel type de travaux ? *">
                <div className="relative">
                  <select
                    required
                    value={form.typeProjet}
                    onChange={update("typeProjet")}
                    className={`${inputBase} appearance-none pr-10 cursor-pointer`}
                  >
                    <option value="">Sélectionnez...</option>
                    {SERVICE_KEYS.map((k) => (
                      <option key={k} value={SERVICES[k].label}>
                        {SERVICES[k].title}
                      </option>
                    ))}
                  </select>
                  <ChevronDown className="w-4 h-4 absolute right-0 top-4 text-[#0A0A0A]/40 pointer-events-none" />
                </div>
              </Field>
            </div>

            <div>
              <div className="flex items-baseline gap-4 mb-8">
                <span className="font-['Fraunces'] italic text-3xl text-[#AED8E6]">03</span>
                <h3 className="font-['Fraunces'] text-2xl md:text-3xl text-[#0A0A0A]">
                  Quand est prévu votre projet ?
                </h3>
              </div>
              <RadioGroup
                name="delai"
                value={form.delai}
                onChange={updateRadio}
                options={["Maintenant", "< 3 mois", "3–6 mois", "+6 mois"]}
              />
            </div>

            <div>
              <div className="flex items-baseline gap-4 mb-8">
                <span className="font-['Fraunces'] italic text-3xl text-[#AED8E6]">04</span>
                <h3 className="font-['Fraunces'] text-2xl md:text-3xl text-[#0A0A0A]">
                  Surface concernée
                </h3>
              </div>
              <RadioGroup
                name="surface"
                value={form.surface}
                onChange={updateRadio}
                options={["< 25 m²", "25–50 m²", "50–100 m²", "+100 m²"]}
              />
            </div>

            <div>
              <div className="flex items-baseline gap-4 mb-8">
                <span className="font-['Fraunces'] italic text-3xl text-[#AED8E6]">05</span>
                <h3 className="font-['Fraunces'] text-2xl md:text-3xl text-[#0A0A0A]">
                  Détails du projet
                </h3>
              </div>
              <Field label="Décrivez votre projet en quelques lignes *">
                <textarea
                  rows={5}
                  required
                  value={form.description}
                  onChange={update("description")}
                  className={`${inputBase} resize-none`}
                  placeholder="État actuel, envies, contraintes, budget approximatif..."
                />
              </Field>
            </div>

            <div>
              <div className="flex items-baseline gap-4 mb-3">
                <span className="font-['Fraunces'] italic text-3xl text-[#AED8E6]">06</span>
                <h3 className="font-['Fraunces'] text-2xl md:text-3xl text-[#0A0A0A]">
                  Comment souhaitez-vous être contacté ?
                </h3>
              </div>
              <p className="text-sm text-[#0A0A0A]/60 mb-6 pl-14">
                Cette étape nous permet de vous proposer un suivi adapté à votre demande.
              </p>
              <div className="grid md:grid-cols-2 gap-4">
                {[
                  {
                    val: "Devis précis + visite",
                    icon: Phone,
                    title: "Devis précis avec visite",
                    desc: "Je souhaite être rappelé pour obtenir un devis précis et des conseils sur place.",
                  },
                  {
                    val: "Estimation rapide email",
                    icon: Mail,
                    title: "Estimation par email",
                    desc: "Je souhaite recevoir une estimation indicative par email rapidement.",
                  },
                ].map((opt) => {
                  const Ic = opt.icon;
                  const active = form.contactType === opt.val;
                  return (
                    <button
                      key={opt.val}
                      type="button"
                      onClick={() => updateRadio("contactType", opt.val)}
                      className={`p-6 text-left rounded-2xl border transition-all ${
                        active
                          ? "bg-[#0A0A0A] border-[#0A0A0A] text-[#F7F4ED]"
                          : "bg-[#F7F4ED] border-[#0A0A0A]/20 text-[#0A0A0A] hover:border-[#0A0A0A]"
                      }`}
                    >
                      <Ic
                        className={`w-6 h-6 mb-4 ${
                          active ? "text-[#AED8E6]" : "text-[#0A0A0A]"
                        }`}
                        strokeWidth={1.5}
                      />
                      <div className="font-['Fraunces'] text-xl mb-2">{opt.title}</div>
                      <div
                        className={`text-sm ${
                          active ? "text-[#F7F4ED]/70" : "text-[#0A0A0A]/60"
                        }`}
                      >
                        {opt.desc}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>

            <div className="pt-8 border-t border-[#0A0A0A]/10">
              {error && (
                <p className="mb-4 text-sm text-red-600">{error}</p>
              )}
              <button
                type="submit"
                disabled={submitting}
                className="w-full md:w-auto inline-flex items-center justify-center gap-3 bg-[#0A0A0A] text-[#F7F4ED] px-10 py-5 rounded-full text-sm tracking-wide hover:bg-[#AED8E6] hover:text-[#0A0A0A] transition-colors duration-300 group disabled:opacity-50 disabled:cursor-not-allowed"
              >
                {submitting ? "Envoi en cours…" : "Envoyer ma demande"}
                {!submitting && <Send className="w-4 h-4 group-hover:translate-x-1 transition-transform" />}
              </button>
              <p className="mt-4 text-xs text-[#0A0A0A]/50">
                Nous vous répondrons dans les plus brefs délais.
              </p>
            </div>
          </form>
        </div>
      </section>
    </React.Fragment>
  );
};

Object.assign(window, { ContactPage });

const { useState: useStateA } = React;

function App() {
  const [page, setPage] = useStateA("home");

  const go = (p) => {
    setPage(p);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const renderPage = () => {
    if (page === "home") return <HomePage go={go} />;
    if (page === "services") return <ServicesPage go={go} />;
    if (page === "realisations") return <RealisationsPage go={go} />;
    if (page === "contact") return <ContactPage />;
    if (SERVICE_KEYS.includes(page)) return <ServicePage slug={page} go={go} />;
    return <HomePage go={go} />;
  };

  return (
    <div
      className="min-h-screen bg-[#F7F4ED] text-[#0A0A0A] antialiased"
      style={{ fontFamily: "'Manrope', sans-serif" }}
    >
      <Header go={go} current={page} />
      <main key={page} className="animate-fadeIn">
        {renderPage()}
      </main>
      <Footer go={go} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

  <script>
    // Hide splash once React has mounted something into #root
    (function () {
      const boot = document.getElementById('__boot');
      const root = document.getElementById('root');
      const obs = new MutationObserver(() => {
        if (root.childElementCount > 0) {
          boot.classList.add('gone');
          setTimeout(() => boot.remove(), 500);
          obs.disconnect();
        }
      });
      obs.observe(root, { childList: true });
    })();
  </script>
